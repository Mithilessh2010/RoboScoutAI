services:
  - type: web
    name: roboscoutai-server
    runtime: docker
    plan: free
    branch: main
    rootDir: .
    repo: https://github.com/Mithilessh2010/RoboScoutAI
    dockerfilePath: ./packages/server/Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:./ftcscout.db
      - key: FTC_API_KEY
        sync: false
      - key: PORT
        value: 10000