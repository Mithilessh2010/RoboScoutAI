<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
    <title id="title">RoboScoutAI logo</title>
    <desc id="desc">A purple and pink RoboScoutAI mark with a stylized R, scouting signal arcs, and wordmark.</desc>
    <defs>
        <linearGradient id="markGradient" x1="236" y1="138" x2="628" y2="440" gradientUnits="userSpaceOnUse">
