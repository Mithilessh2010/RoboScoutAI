            <stop offset="0.45" stop-color="#982598" />
            <stop offset="0.72" stop-color="#E491C9" />
            <stop offset="1" stop-color="#7F2086" />
        </linearGradient>
        <linearGradient id="wordGradient" x1="122" y1="520" x2="826" y2="520" gradientUnits="userSpaceOnUse">
