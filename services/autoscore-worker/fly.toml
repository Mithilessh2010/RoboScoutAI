app = "roboscoutai-autoscore-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  context = "../.."

[env]
  PORT = "8080"
  AUTOSCORE_FRAME_STRIDE = "90"
  AUTOSCORE_CONF = "0.25"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
